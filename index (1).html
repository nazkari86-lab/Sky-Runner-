    function spawnRing(ring, initial) {
      ring.mesh.position.x = rand(-180, 160);
      ring.mesh.position.y = rand(60, 250);
      ring.mesh.position.z = initial ? rand(-2600, -1000) : rand(-2800, -1200);

      ring.mesh.rotation.x = Math.random() * Math.PI;
      ring.mesh.rotation.y = Math.random() * Math.PI;
      ring.mesh.rotation.z = Math.random() * Math.PI;

      ring.mesh.scale.set(1 + Math.random() * 0.4, 1 + Math.random() * 0.4, 1 + Math.random() * 0.4);
      ring.collected = false;
    }

    function spawnObstacle(obstacle, initial) {
      var targetType = currentStage;
      if (currentStage > 0) {
        var r = Math.random();
        if (currentStage === 1) {
          targetType = r > 0.8 ? 0 : 1;
        } else if (currentStage === 2) {
          if (r > 0.7) targetType = 2;
          else if (r > 0.3) targetType = 1;
          else targetType = 0;
        } else if (currentStage === 3) {
          targetType = r > 0.4 ? 3 : 2;
        }
      }

      if (obstacle.type !== targetType) {
        scene.remove(obstacle.mesh);
        var idx = obstacles.indexOf(obstacle);
        obstacle = new Obstacle(targetType);
        scene.add(obstacle.mesh);
        obstacles[idx] = obstacle;
      }
      
      obstacle.mesh.position.x = rand(-215, 215);
      obstacle.mesh.position.y = rand(35, 255);
      obstacle.mesh.position.z = initial ? rand(-3600, -1200) : rand(-3800, -1250);

      obstacle.mesh.rotation.x = Math.random() * Math.PI;
      obstacle.mesh.rotation.y = Math.random() * Math.PI;
      obstacle.mesh.rotation.z = Math.random() * Math.PI;

      obstacle.mesh.scale.set(0.8 + Math.random() * 0.8, 0.8 + Math.random() * 0.8, 0.8 + Math.random() * 0.8);
    }

    function spawnPowerup(powerup, initial) {
      powerup.type = powerupTypes[Math.floor(Math.random() * powerupTypes.length)];
      scene.remove(powerup.mesh);
      var fresh = new PowerUp(powerup.type);
      var idx = powerups.indexOf(powerup);
      fresh.mesh.position.x = rand(-170, 150);
      fresh.mesh.position.y = rand(70, 230);
      fresh.mesh.position.z = initial ? rand(-5600, -2200) : rand(-7000, -3200);
      fresh.mesh.scale.set(1.0, 1.0, 1.0);
      fresh.collected = false;
      scene.add(fresh.mesh);
      if (idx !== -1) {
        powerups[idx] = fresh;
      }
    }

    function resetGame(startNow) {
      if (reviveInterval) clearInterval(reviveInterval);
      score = 0;
      lives = maxLives;
      gameOver = !startNow;
      won = false;
      hitTimer = 0;
      runTime = 0;
      distance = 0;
      comboCount = 0;
      comboTimer = 0;
      bestComboThisRun = 0;
      ringsCollectedThisRun = 0;
      currentStage = 0;
      scoreMultiplier = 1;
      activeEffects = { shield: 0, magnet: 0, slow: 0 };
      runSaved = false;
      frameCounter = 0;

      mousePos = { x: 0, y: 0 };

      airplane.mesh.position.set(-40, 110, -250);
      airplane.mesh.rotation.set(0, 0, 0);
      airplane.propeller.rotation.set(0, 0, 0);

      for (var i = 0; i < rings.length; i++) {
        spawnRing(rings[i], true);
      }

      for (var j = 0; j < obstacles.length; j++) {
        spawnObstacle(obstacles[j], true);
      }

      for (var k = 0; k < powerups.length; k++) {
        spawnPowerup(powerups[k], true);
      }

      modalEl.classList.add("hidden");
      updateHUD();
      if (startNow) {
        soundManager.playStart();
        soundManager.startMusic();
      }
    }

    function startGame() {
      soundManager.ensureReady();
      stats.gamesPlayed = (stats.gamesPlayed || 0) + 1;
      saveStats();
      gameMode = "playing";
      setBodyMode("playing");
      menuOverlayEl.classList.add("hidden");
      modalEl.classList.add("hidden");
      resetGame(true);
      renderMenuStats();
    }

    function restartGame() {
      startGame();
    }

    function showMainMenu() {
      if (reviveInterval) clearInterval(reviveInterval);
      gameMode = "menu";
      gameOver = true;
      setBodyMode("menu");
      modalEl.classList.add("hidden");
      menuOverlayEl.classList.remove("hidden");
      soundManager.stopMusic();
      renderMenuStats();
      if (currentSidePanel === "settings") showSettingsPanel();
      else showLeaderboardPanel();
    }

    function pauseGame() {
      if (gameMode !== "playing") return;
      gameMode = "paused";
      gameOver = true;
      setBodyMode("paused");
      soundManager.stopMusic();
      modalTitleEl.textContent = t("pausedTitle");
      modalTextEl.textContent = t("pausedText");
      runSummaryEl.style.display = "none";
      reviveBtn.style.display = "none";
      resumeBtn.style.display = "inline-block";
      restartBtn.style.display = "inline-block";
      menuBtn.style.display = "inline-block";
      modalEl.classList.remove("hidden");
    }

    function resumeGame() {
      if (gameMode !== "paused") return;
      gameMode = "playing";
      gameOver = false;
      setBodyMode("playing");
      modalEl.classList.add("hidden");
      soundManager.startMusic();
    }

    function togglePause() {
      if (gameMode === "playing") pauseGame();
      else if (gameMode === "paused") resumeGame();
    }

    function updateHUD() {
      var gameSpeed = getGameSpeed();
      var baseSpeed = getBaseGameSpeed();
      var baseMultiplier = baseSpeed >= 2.0 ? 3 : (baseSpeed >= 1.45 ? 2 : 1);
      var comboBonus = Math.min(3, Math.floor(comboCount / 5));
      scoreMultiplier = Math.min(6, baseMultiplier + comboBonus);
      
      setTextIfChanged(scoreEl, "score", score + (scoreMultiplier > 1 ? " (x" + scoreMultiplier + ")" : ""));
      setTextIfChanged(bestScoreEl, "bestScore", Math.max(getBestScore(), score));
      setTextIfChanged(comboEl, "combo", comboCount + (comboTimer > 0 ? " / " + Math.ceil(comboTimer) + "s" : ""));
      
      var heartsHTML = "";
      for (var i = 0; i < maxLives; i++) {
        if (i < lives) {
          heartsHTML += "<span style='color: #ff4d4d; margin-right: 2px;'>❤</span>";
        } else {
          heartsHTML += "<span style='color: #666666; margin-right: 2px;'>❤</span>";
        }
      }
      setHTMLIfChanged(livesEl, "lives", heartsHTML);
      
      setTextIfChanged(speedEl, "speed", gameSpeed.toFixed(1) + "x");
      setTextIfChanged(stageNameEl, "stageName", formatStageName(currentStage));
      var powerupText = getActivePowerupText();
      setDisplayIfChanged(powerupBadgeEl, "powerupDisplay", powerupText ? "inline-block" : "none");
      setTextIfChanged(powerupTextEl, "powerupText", powerupText);
    }

    function showEndScreen(title, text) {
      if (reviveInterval) clearInterval(reviveInterval);
      saveHighScore();
      gameMode = "gameover";
      setBodyMode("gameover");
      soundManager.stopMusic();
      modalTitleEl.textContent = title;
      modalTextEl.textContent = text;
      runSummaryEl.style.display = "flex";
      runSummaryScoreEl.textContent = score;
      resumeBtn.style.display = "none";
      reviveBtn.style.display = "none";
      restartBtn.style.display = "inline-block";
      menuBtn.style.display = "inline-block";
      modalEl.classList.remove("hidden");
    }

    function showReviveScreen() {
      gameMode = "revive";
      gameOver = true;
      reviveTimer = 5;
      setBodyMode("gameover");
      modalTitleEl.textContent = t("crashTitle");
      modalTextEl.textContent = t("reviveText", { cost: REVIVE_COST, seconds: reviveTimer });
      runSummaryEl.style.display = "flex";
      runSummaryScoreEl.textContent = score;
      resumeBtn.style.display = "none";
      reviveBtn.style.display = "inline-block";
      restartBtn.style.display = "inline-block";
      menuBtn.style.display = "inline-block";
      modalEl.classList.remove("hidden");

      reviveInterval = setInterval(function() {
        reviveTimer--;
        if (reviveTimer > 0) {
          modalTextEl.textContent = t("reviveText", { cost: REVIVE_COST, seconds: reviveTimer });
        } else {
          clearInterval(reviveInterval);
          showEndScreen(t("gameOverTitle"), t("gameOverText"));
        }
      }, 1000);
    }

    function doRevive() {
      if (score >= REVIVE_COST) {
        clearInterval(reviveInterval);
        score -= REVIVE_COST;
        lives = maxLives;
        gameMode = "playing";
        gameOver = false;
        hitTimer = 1.5; // Invincibility briefly
        activeEffects.shield = Math.max(activeEffects.shield, POWERUP_DURATIONS.reviveShield);
        stats.totalRevives = (stats.totalRevives || 0) + 1;
        saveStats();
        unlockAchievement("revive");
        
        for (var i = 0; i < obstacles.length; i++) {
           if (obstacles[i].mesh.position.z > -1000) {
             spawnObstacle(obstacles[i], false);
           }
        }
        
        modalEl.classList.add("hidden");
        setBodyMode("playing");
        soundManager.startMusic();
        updateHUD();
      }
    }

    function handlePointerMove(event) {
      if (settings.controls === "keyboard") return;
      var x = event.clientX;
      var y = event.clientY;

      if (event.touches && event.touches.length) {
        x = event.touches[0].clientX;
        y = event.touches[0].clientY;
      }

      mousePos.x = -1 + (x / WIDTH) * 2;
      mousePos.y = 1 - (y / HEIGHT) * 2;
    }

    function handleKeyDown(event) {
      var target = event.target;
      var isTyping = target && (target.tagName === "INPUT" || target.tagName === "SELECT" || target.tagName === "TEXTAREA");
      var key = event.key.toLowerCase();
      if (isTyping && key !== "escape") return;

      if (["arrowleft", "arrowright", "arrowup", "arrowdown", " "].indexOf(key) !== -1 && gameMode === "playing") {
        event.preventDefault();
      }

      if (key === "p") {
        togglePause();
        return;
      }
      if (key === "escape") {
        if (gameMode === "playing") pauseGame();
        else if (gameMode === "paused") resumeGame();
        return;
      }
      if (key === "f") {
        toggleFullscreen();
        return;
      }
      if (key === "m") {
        soundManager.setMuted(settings.sound !== false);
        return;
      }
      if ((key === "enter" || key === " ") && gameMode === "menu") {
        startGame();
        return;
      }

      keys[key] = true;
    }

    function handleKeyUp(event) {
      keys[event.key.toLowerCase()] = false;
    }

    function toggleFullscreen() {
      var root = document.documentElement;
      if (!document.fullscreenElement && root.requestFullscreen) {
        root.requestFullscreen();
      } else if (document.exitFullscreen) {
        document.exitFullscreen();
      }
    }

    function applyKeyboardControls() {
      if (gameMode !== "playing" || settings.controls === "pointer") return;
      var step = 0.025;

      if (keys["arrowleft"] || keys["a"]) mousePos.x -= step;
      if (keys["arrowright"] || keys["d"]) mousePos.x += step;
      if (keys["arrowup"] || keys["w"]) mousePos.y += step;
      if (keys["arrowdown"] || keys["s"]) mousePos.y -= step;

      mousePos.x = clamp(mousePos.x, -0.95, 0.95);
      mousePos.y = clamp(mousePos.y, -0.95, 0.95);
    }

    function updatePlane() {
      var targetY = normalize(mousePos.y, -0.75, 0.75, 50, 190);
      var targetX = normalize(mousePos.x, -0.75, 0.75, -100, -20);

      // Smoother interpolation with easing
      var smoothFactor = 0.08;
      airplane.mesh.position.y += (targetY - airplane.mesh.position.y) * smoothFactor;
      airplane.mesh.position.x += (targetX - airplane.mesh.position.x) * smoothFactor;

      // Smoother rotation with damping
      var targetRotZ = (targetY - airplane.mesh.position.y) * 0.015;
      var targetRotX = (airplane.mesh.position.y - targetY) * 0.008;
      var targetRotY = (airplane.mesh.position.x - targetX) * 0.008;

      airplane.mesh.rotation.z += (targetRotZ - airplane.mesh.rotation.z) * 0.15;
      airplane.mesh.rotation.x += (targetRotX - airplane.mesh.rotation.x) * 0.15;
      airplane.mesh.rotation.y += (targetRotY - airplane.mesh.rotation.y) * 0.15;

      // Dynamic propeller speed based on game speed
      var gameSpeed = getGameSpeed();
      airplane.propeller.rotation.x += 0.35 * gameSpeed;

      // Gentle hovering animation
      var now = gameNow();
      var motionScale = getMotionScale();
      airplane.mesh.position.y += Math.sin(now * 0.002) * 0.1 * motionScale;

      // Update exhaust
      if (exhaustParticles) {
         var verts = exhaustParticles.geometry.vertices;
         var p = verts[exhaustIdx];
         p.copy(airplane.mesh.position);
         p.x -= 15;
         p.y -= 2;
         p.life = 1.0;
         p.maxLife = 1.0;
         p.size = 1.0;
         p.velocity.set(-Math.random()*3 - 3, Math.random()*3 - 1.5, Math.random()*3 - 1.5);
         exhaustIdx = (exhaustIdx + 1) % verts.length;

         for (var i = 0; i < verts.length; i++) {
            var pt = verts[i];
            if (pt.life > 0) {
               pt.life -= 0.035;
               pt.add(pt.velocity);
               pt.y -= 0.5;
               pt.velocity.x *= 0.98;
               pt.velocity.y *= 0.98;
               pt.velocity.z *= 0.98;
            } else {
               pt.y = -1000;
            }
         }
         exhaustParticles.geometry.verticesNeedUpdate = true;
         var targetColor = currentStage === 3 ? 0xffaa00 : 0x88ccff;
         exhaustParticles.material.color.setHex(targetColor);
      }
    }

    function normalize(v, vmin, vmax, tmin, tmax) {
      var nv = Math.max(Math.min(v, vmax), vmin);
      var dv = vmax - vmin;
      var pc = (nv - vmin) / dv;
      var dt = tmax - tmin;
      return tmin + (pc * dt);
    }

    var currentSkyColors = { tR: 105, tG: 143, tB: 196, bR: 155, bG: 206, bB: 230, hInt: 0.95, sInt: 1.25 };
    function lerp(start, end, amt) {
      return (1 - amt) * start + amt * end;
    }

    function updateBackgroundAndLighting() {
      var target = { tR: 105, tG: 143, tB: 196, bR: 155, bG: 206, bB: 230, hInt: 0.95, sInt: 1.25 };
      var targetOffSet = -3000;
      
      if (currentStage === 1) { // Snow
        target = { tR: 205, tG: 218, tB: 232, bR: 118, bG: 145, bB: 172, hInt: 0.82, sInt: 0.72 };
        sun.mesh.visible = false;
        scene.fog.color.setHex(0xaaaaaa);
        scene.fog.density = lerp(scene.fog.density, 0.0012, 0.05);
      } else if (currentStage === 2) { // Storm
        target = { tR: 38, tG: 44, tB: 53, bR: 12, bG: 17, bB: 24, hInt: 0.42, sInt: 0.32 };
        sun.mesh.visible = false;
        scene.fog.color.setHex(0x111111);
        scene.fog.density = lerp(scene.fog.density, 0.002, 0.05);
        if (Math.random() > 0.98) {
           target.hInt = 3.0; target.sInt = 2.0; target.tR = 200; target.tG = 200; target.tB = 220;
        }
      } else if (currentStage === 3) { // Space
        target = { tR: 5, tG: 5, tB: 10, bR: 0, bG: 0, bB: 5, hInt: 0.3, sInt: 0.3 };
        sun.mesh.visible = false;
        scene.fog.color.setHex(0x000000);
        scene.fog.density = lerp(scene.fog.density, 0.0, 0.05);
        targetOffSet = -5000; // Sink the earth
        
        if (stars) {
           stars.points.material.opacity = lerp(stars.points.material.opacity, 1.0, 0.02);
        }

        if (solarSystem) {
           solarSystem.mesh.visible = true;
           solarSystem.mesh.position.y = lerp(solarSystem.mesh.position.y, 100, 0.01);
           solarSystem.mesh.rotation.y += 0.0005;
           for (var i = 0; i < solarSystem.planets.length; i++) {
             solarSystem.planets[i].rotation.y += 0.01;
           }
        }
      } else {
        sun.mesh.visible = true;
        scene.fog.color.setHex(0x8090a0);
        scene.fog.density = lerp(scene.fog.density, 0.0006, 0.05);
        
        if (stars) {
           stars.points.material.opacity = lerp(stars.points.material.opacity, 0.0, 0.05);
        }
        if (solarSystem) {
           solarSystem.mesh.position.y = lerp(solarSystem.mesh.position.y, -2000, 0.02);
           if (solarSystem.mesh.position.y < -1900) solarSystem.mesh.visible = false;
        }
      }

      offSet = lerp(offSet, targetOffSet, 0.02);
      if (land) {
        land.mesh.position.y = offSet;
        land.mesh.material.color.setHex(0x2f9b4b);
      }
      if (forest) forest.mesh.position.y = offSet;
      if (sky) sky.mesh.position.y = offSet;
      if (orbit) orbit.mesh.position.y = offSet;

      currentSkyColors.tR = lerp(currentSkyColors.tR, target.tR, 0.05);
      currentSkyColors.tG = lerp(currentSkyColors.tG, target.tG, 0.05);
      currentSkyColors.tB = lerp(currentSkyColors.tB, target.tB, 0.05);
      currentSkyColors.bR = lerp(currentSkyColors.bR, target.bR, 0.05);
      currentSkyColors.bG = lerp(currentSkyColors.bG, target.bG, 0.05);
      currentSkyColors.bB = lerp(currentSkyColors.bB, target.bB, 0.05);
      currentSkyColors.hInt = lerp(currentSkyColors.hInt, target.hInt, 0.1);
      currentSkyColors.sInt = lerp(currentSkyColors.sInt, target.sInt, 0.1);

      container.style.background = "linear-gradient(to bottom, rgb(" +
        Math.round(currentSkyColors.tR) + "," + Math.round(currentSkyColors.tG) + "," + Math.round(currentSkyColors.tB) + "), rgb(" +
        Math.round(currentSkyColors.bR) + "," + Math.round(currentSkyColors.bG) + "," + Math.round(currentSkyColors.bB) + "))";

      scene.fog.color.setRGB(currentSkyColors.bR / 255, currentSkyColors.bG / 255, currentSkyColors.bB / 255);
      hemisphereLight.intensity = currentSkyColors.hInt;
      shadowLight.intensity = currentSkyColors.sInt;
    }

    var ringColors = [0xffd700, 0x00ffff, 0x8a2be2, 0xff00ff];
    var ringEmissives = [0x553300, 0x004444, 0x330055, 0x550055];

    function updateCollectibles() {
      var gameSpeed = getGameSpeed();
      var planePos = airplane.mesh.position;
      var now = gameNow();
      var motionScale = getMotionScale();
      
      var currentColor = ringColors[currentStage];
      var currentEmissive = ringEmissives[currentStage];

      for (var i = 0; i < rings.length; i++) {
        var ring = rings[i];
        
        // Dynamic ring colors
        if (ring.torus.material.color.getHex() !== currentColor) {
           ring.torus.material.color.setHex(currentColor);
           ring.torus.material.emissive.setHex(currentEmissive);
        }

        ring.mesh.position.z += gameSpeed * 11;
        ring.mesh.rotation.y += (0.03 + Math.sin(now * 0.001 + i) * 0.02) * motionScale;
        ring.mesh.rotation.x += (0.015 + Math.cos(now * 0.0015 + i) * 0.01) * motionScale;
        ring.mesh.position.y += Math.sin(now * 0.003 + i * 0.5) * 0.2 * motionScale;

        if (activeEffects.magnet > 0 && ring.mesh.position.z > -650 && ring.mesh.position.z < 70) {
          ring.mesh.position.x += (planePos.x - ring.mesh.position.x) * 0.036;
          ring.mesh.position.y += (planePos.y - ring.mesh.position.y) * 0.036;
        }

        if (ring.mesh.position.z > 180) {
          spawnRing(ring, false);
        }

        var dx = planePos.x - ring.mesh.position.x;
        var dy = planePos.y - ring.mesh.position.y;
        var dz = planePos.z - ring.mesh.position.z;
        var distSq = dx * dx + dy * dy + dz * dz;

        var collectRadius = activeEffects.magnet > 0 ? 55 : 32;
        if (distSq < collectRadius * collectRadius) {
          comboCount++;
          comboTimer = 2.4;
          bestComboThisRun = Math.max(bestComboThisRun, comboCount);
          ringsCollectedThisRun++;
          score += 10 * scoreMultiplier;
          ring.collected = true;
          soundManager.playCollect();
          unlockAchievement("firstRing");
          if (comboCount >= 5) unlockAchievement("combo5");
          spawnRing(ring, false);
        }
      }
    }

    function activatePowerup(type) {
      if (type === "shield") activeEffects.shield = Math.max(activeEffects.shield, POWERUP_DURATIONS.shield);
      if (type === "magnet") activeEffects.magnet = Math.max(activeEffects.magnet, POWERUP_DURATIONS.magnet);
      if (type === "slow") activeEffects.slow = Math.max(activeEffects.slow, POWERUP_DURATIONS.slow);
      soundManager.playPowerup();
    }

    function updatePowerups() {
      var gameSpeed = getGameSpeed();
      var planePos = airplane.mesh.position;
      var motionScale = getMotionScale();

      for (var i = 0; i < powerups.length; i++) {
        var powerup = powerups[i];
        powerup.mesh.position.z += gameSpeed * 10.5;
        powerup.mesh.rotation.y += 0.04 * motionScale;
        powerup.mesh.rotation.x += 0.025 * motionScale;
        if (powerup.shell) powerup.shell.rotation.z += 0.05 * motionScale;

        if (powerup.mesh.position.z > 180) {
          spawnPowerup(powerup, false);
          continue;
        }

        var dx = planePos.x - powerup.mesh.position.x;
        var dy = planePos.y - powerup.mesh.position.y;
        var dz = planePos.z - powerup.mesh.position.z;
        var distSq = dx * dx + dy * dy + dz * dz;

        if (distSq < 42 * 42) {
          activatePowerup(powerup.type);
          spawnPowerup(powerup, false);
        }
      }
    }

    var weatherParticles;
    var lightningMesh;
    var lightningTimer = 0;
    
    function createWeather() {
      var particleCount = getQualityConfig().weatherParticles;
      var pMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 6,
        transparent: true,
        opacity: 0.85,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true
      });

      var pGeometry = new THREE.Geometry();
      for (var p = 0; p < particleCount; p++) {
        var pX = Math.random() * 2000 - 1000;
        var pY = Math.random() * 2000 - 500;
        var pZ = Math.random() * 2000 - 1000;
        var particle = new THREE.Vector3(pX, pY, pZ);
        particle.velocity = new THREE.Vector3(0, -Math.random() * 2 - 1, 0);
        particle.windOffset = Math.random() * Math.PI * 2;
        pGeometry.vertices.push(particle);
      }
      weatherParticles = new THREE.Points(pGeometry, pMaterial);
      weatherParticles.visible = false;
      scene.add(weatherParticles);

      // Create lightning mesh
      var lGeom = new THREE.Geometry();
      for (var i = 0; i < 25; i++) {
        lGeom.vertices.push(new THREE.Vector3(0, -i * 35, 0));
      }
      var lMat = new THREE.LineBasicMaterial({ color: 0xffffaa, linewidth: 5, transparent: true, opacity: 0.9 });
      lightningMesh = new THREE.Line(lGeom, lMat);
      lightningMesh.position.set(0, 400, -300);
      lightningMesh.visible = false;
      scene.add(lightningMesh);
    }

    function updateWeather() {
      if (!weatherParticles) return;
      var verts = weatherParticles.geometry.vertices;
      var now = gameNow();
      var motionScale = getMotionScale();
      
      if (currentStage === 0) { // Sunny
        weatherParticles.visible = false;
        lightningMesh.visible = false;
      } else if (currentStage === 1) { // Snow
        weatherParticles.visible = true;
        lightningMesh.visible = false;
        weatherParticles.material.color.setHex(0xffffff);
        weatherParticles.material.size = 5;
        for (var i = 0; i < verts.length; i++) {
          var v = verts[i];
          v.y -= 1.5;
          v.x += Math.sin(now * 0.001 + v.windOffset) * 0.8 * motionScale;
          v.z += Math.cos(now * 0.001 + v.windOffset) * 0.3 * motionScale;
          if (v.y < -500) v.y = 1500;
        }
        weatherParticles.geometry.verticesNeedUpdate = true;
      } else if (currentStage === 2) { // Storm
        weatherParticles.visible = true;
        weatherParticles.material.color.setHex(0xaaaaaa);
        weatherParticles.material.size = 12;
        for (var j = 0; j < verts.length; j++) {
          var vv = verts[j];
          vv.y -= 45;
          vv.x -= (6 + Math.sin(now * 0.002 + vv.windOffset) * 2) * motionScale;
          if (vv.y < -500) vv.y = 1500;
        }
        weatherParticles.geometry.verticesNeedUpdate = true;

        if (Math.random() > 0.965 && lightningTimer <= 0) {
          lightningTimer = 0.6;
          lightningMesh.visible = true;
          lightningMesh.position.x = rand(-400, 400);
          lightningMesh.position.z = rand(-600, -100);
          for (var l = 1; l < lightningMesh.geometry.vertices.length; l++) {
            lightningMesh.geometry.vertices[l].x = lightningMesh.geometry.vertices[l-1].x + rand(-35, 35);
            lightningMesh.geometry.vertices[l].z = lightningMesh.geometry.vertices[l-1].z + rand(-35, 35);
          }
          lightningMesh.geometry.verticesNeedUpdate = true;
        }

        if (lightningTimer > 0) {
          lightningTimer -= 0.04;
          if (lightningTimer <= 0) {
            lightningMesh.visible = false;
          }
        }
      } else if (currentStage === 3) { // Space
        weatherParticles.visible = true;
        lightningMesh.visible = false;
        weatherParticles.material.color.setHex(0xffffff);
        weatherParticles.material.size = 3;
        for (var k = 0; k < verts.length; k++) {
          var vk = verts[k];
          vk.z += 12;
          vk.x += Math.sin(now * 0.0005 + vk.windOffset) * 0.2 * motionScale;
          if (vk.z > 200) vk.z = -1800;
        }
        weatherParticles.geometry.verticesNeedUpdate = true;
      }
    }

    function updateForest() {
      if (!forest || !forest.trees) return;
      var t = gameNow();
      for (var i = 0; i < forest.trees.length; i++) {
        var tree = forest.trees[i];
        
        // Sway animation
        tree.canopy.rotation.x = Math.sin(t * tree.swaySpeed + tree.swayOffset) * 0.1;
        tree.canopy.rotation.z = Math.cos(t * tree.swaySpeed + tree.swayOffset) * 0.1;
        
        // Smooth scale popping
        var globalAngle = (tree.angle + forest.mesh.rotation.z) % (Math.PI * 2);
        if (globalAngle < 0) globalAngle += Math.PI * 2;
        
        tree.snowCap.visible = (currentStage === 1); // Only show snow in Snow stage

        var sinA = Math.sin(globalAngle);
        var scale = 0.001;
        
        if (sinA > 0.8) {
          scale = tree.baseScale;
        } else if (sinA > 0.6) {
          scale = tree.baseScale * ((sinA - 0.6) / 0.2);
        }
        
        tree.mesh.scale.set(scale, scale, scale);
      }
    }

    function updateObstacles() {
      var gameSpeed = getGameSpeed();
      var planePos = airplane.mesh.position;
      var now = gameNow();
      var motionScale = getMotionScale();

      for (var i = 0; i < obstacles.length; i++) {
        var obstacle = obstacles[i];
        obstacle.mesh.position.z += gameSpeed * 15.5;
        obstacle.mesh.rotation.x += (0.02 + Math.sin(now * 0.002 + i) * 0.015) * motionScale;
        obstacle.mesh.rotation.y += (0.025 + Math.cos(now * 0.0025 + i) * 0.01) * motionScale;
        obstacle.mesh.rotation.z += 0.01 * motionScale;
        obstacle.mesh.position.y += Math.sin(now * 0.004 + i * 0.7) * 0.15 * motionScale;

        if (obstacle.mesh.position.z > 180) {
          spawnObstacle(obstacle, false);
        }

        var dx = planePos.x - obstacle.mesh.position.x;
        var dy = planePos.y - obstacle.mesh.position.y;
        var dz = planePos.z - obstacle.mesh.position.z;
        var distSq = dx * dx + dy * dy + dz * dz;

        if (distSq < 34 * 34 && hitTimer <= 0) {
          if (settings.immortalMode) {
            comboCount = 0;
            comboTimer = 0;
            hitTimer = 0.45;
            soundManager.playObstacle();
            spawnObstacle(obstacle, false);
            continue;
          }
          if (activeEffects.shield > 0) {
            activeEffects.shield = 0;
            hitTimer = 0.65;
            soundManager.playPowerup();
            spawnObstacle(obstacle, false);
            continue;
          }
          lives--;
          comboCount = 0;
          comboTimer = 0;
          hitTimer = 0.4;
          soundManager.playObstacle();
          spawnObstacle(obstacle, false);

          if (lives <= 0) {
            lives = 0;
            if (score >= REVIVE_COST) {
              showReviveScreen();
            } else {
              gameOver = true;
              showEndScreen(t("gameOverTitle"), t("gameOverText"));
            }
          }
        }
      }
    }

    var cityCountries = [
      { name: "Japan", capital: "Tokyo", style: "ASIAN" },
      { name: "China", capital: "Beijing", style: "ASIAN" },
      { name: "Indonesia", capital: "Jakarta", style: "ASIAN" },
      { name: "Bangladesh", capital: "Dhaka", style: "ASIAN" },
      { name: "India", capital: "New Delhi", style: "MIDDLE_EASTERN" },
      { name: "Egypt", capital: "Cairo", style: "MIDDLE_EASTERN" },
      { name: "Pakistan", capital: "Islamabad", style: "MIDDLE_EASTERN" },
      { name: "USA", capital: "Washington, D.C.", style: "AMERICAN" },
      { name: "Mexico", capital: "Mexico City", style: "AMERICAN" },
      { name: "Russia", capital: "Moscow", style: "RUSSIAN" },
      { name: "Brazil", capital: "Brasilia", style: "MODERN" },
      { name: "Nigeria", capital: "Abuja", style: "MODERN" },
      { name: "Ethiopia", capital: "Addis Ababa", style: "MODERN" },
      { name: "Germany", capital: "Berlin", style: "EUROPEAN" },
      { name: "France", capital: "Paris", style: "EUROPEAN" }
    ];

    var currentActiveCity = null;

    function updateCities() {
       if (!cityWorld) return;
       cityWorld.position.y = offSet;

       if (currentStage === 3) { // Hide badge in space
           cityBadgeEl.style.display = "none";
           return;
       }

       var topCity = null;
       var minDiff = 999;

       for (var i = 0; i < cities.length; i++) {
          var city = cities[i];
          var globalAngle = (city.angle + cityWorld.rotation.z) % (Math.PI * 2);
          if (globalAngle < 0) globalAngle += Math.PI * 2;
          
          var diff = Math.abs(globalAngle - Math.PI / 2);
          if (diff < minDiff) {
             minDiff = diff;
             topCity = city;
          }
       }

       if (topCity && topCity !== currentActiveCity && minDiff < 0.2) {
          currentActiveCity = topCity;
          var matching = cityCountries.filter(function(country) {
             return country.style === topCity.style;
          });
          if (matching.length > 0) {
             var c = matching[Math.floor(Math.random() * matching.length)];
             cityNameEl.textContent = c.capital + ", " + c.name;
             cityBadgeEl.style.display = "inline-block";
          }
       }
    }

    function updateStageProgression() {
      if (score >= STAGE_THRESHOLDS.space) currentStage = 3; // Space
      else if (score >= STAGE_THRESHOLDS.storm) currentStage = 2; // Storm
      else if (score >= STAGE_THRESHOLDS.snow) currentStage = 1; // Snow
      else currentStage = 0; // Sunny

      if (score >= STAGE_THRESHOLDS.snow) unlockAchievement("score300");
      if (score >= STAGE_THRESHOLDS.space) unlockAchievement("score1000");
      if (runTime >= 60) unlockAchievement("survivor60");
    }

    function updateEffectTimers(dt) {
      powerupTypes.forEach(function(type) {
        activeEffects[type] = Math.max(0, activeEffects[type] - dt);
      });
      if (comboTimer > 0) {
        comboTimer = Math.max(0, comboTimer - dt);
        if (comboTimer === 0) comboCount = 0;
      }
    }

    function stepFrame(dt) {
      if (!renderer || !scene || !camera) return;
      var frameScale = Math.max(0.2, Math.min(2.5, dt * 60));
      gameClock += dt;
      frameCounter++;

      if (gameMode === "playing" && !gameOver) {
        var quality = getQualityConfig();
        var motionScale = getMotionScale();
        runTime += dt;
        distance += getGameSpeed() * 110 * dt;
        applyKeyboardControls();
        updateEffectTimers(dt);
        updateStageProgression();

        land.mesh.rotation.z += 0.001 * frameScale * motionScale;
        orbit.mesh.rotation.z += 0.001 * frameScale * motionScale;
        sky.mesh.rotation.z += 0.0006 * frameScale * motionScale;
        forest.mesh.rotation.z += 0.001 * frameScale * motionScale;
        if (cityWorld) cityWorld.rotation.z += 0.001 * frameScale * motionScale;
        if (stars) stars.mesh.rotation.z += 0.0002 * frameScale * motionScale;

        updatePlane();
        updateCollectibles();
        updatePowerups();
        updateObstacles();
        updateWeather();
        if (frameCounter % quality.forestUpdateInterval === 0) updateForest();
        if (frameCounter % quality.cityUpdateInterval === 0) updateCities();
      }

      updateBackgroundAndLighting();

      if (hitTimer > 0) {
        hitTimer = Math.max(0, hitTimer - dt);
        flashEl.style.opacity = String(Math.max(0, hitTimer * 1.8));
      } else {
        flashEl.style.opacity = "0";
      }

      updateHUD();
      renderer.render(scene, camera);
    }

    function loop(timestamp) {
      var dt = lastFrameTime ? Math.min(0.05, (timestamp - lastFrameTime) / 1000) : 1 / 60;
      lastFrameTime = timestamp;
      stepFrame(dt);
      requestAnimationFrame(loop);
    }

    function createSolarSystem() {
      solarSystem = new SolarSystem();
      scene.add(solarSystem.mesh);
    }

    function renderGameToText() {
      var visibleRings = rings.slice(0, 5).map(function(ring) {
        return {
          x: Math.round(ring.mesh.position.x),
          y: Math.round(ring.mesh.position.y),
          z: Math.round(ring.mesh.position.z)
        };
      });
      var visibleObstacles = obstacles.slice(0, 5).map(function(obstacle) {
        return {
          type: obstacle.type,
          x: Math.round(obstacle.mesh.position.x),
          y: Math.round(obstacle.mesh.position.y),
          z: Math.round(obstacle.mesh.position.z)
        };
      });
      var visiblePowerups = powerups.map(function(powerup) {
        return {
          type: powerup.type,
          x: Math.round(powerup.mesh.position.x),
          y: Math.round(powerup.mesh.position.y),
          z: Math.round(powerup.mesh.position.z)
        };
      });
      return JSON.stringify({
        coordinateSystem: "Three.js world coordinates; x left/right, y up/down, z depth toward camera as it increases.",
        mode: gameMode,
        score: score,
        best: getBestScore(),
        lives: lives,
        combo: comboCount,
        multiplier: scoreMultiplier,
        stage: currentStage,
        stageName: formatStageName(currentStage),
        stageThresholds: STAGE_THRESHOLDS,
        speed: Number(getGameSpeed().toFixed(2)),
        runTime: Number(runTime.toFixed(2)),
        player: airplane ? {
          x: Math.round(airplane.mesh.position.x),
          y: Math.round(airplane.mesh.position.y),
          z: Math.round(airplane.mesh.position.z)
        } : null,
        rings: visibleRings,
        obstacles: visibleObstacles,
        powerups: visiblePowerups,
        activeEffects: {
          shield: Number(activeEffects.shield.toFixed(2)),
          magnet: Number(activeEffects.magnet.toFixed(2)),
          slow: Number(activeEffects.slow.toFixed(2))
        },
        settings: {
          language: settings.language,
          graphics: settings.graphics,
          controls: settings.controls,
          sound: settings.sound !== false,
          reducedMotion: !!settings.reducedMotion,
          immortalMode: !!settings.immortalMode
        }
      });
    }

    function advanceTime(ms) {
      var steps = Math.max(1, Math.round(ms / (1000 / 60)));
      for (var i = 0; i < steps; i++) {
        stepFrame(1 / 60);
      }
      return Promise.resolve();
    }

    function showThreeError() {
      threeErrorEl.classList.add("show");
      threeErrorTextEl.textContent = t("threeError");
      reloadBtn.textContent = t("reload");
      reloadBtn.onclick = function() {
        window.location.reload();
      };
    }

    function bindTouchButton(button) {
      var key = button.getAttribute("data-key");
      var start = function(event) {
        event.preventDefault();
        keys[key] = true;
      };
      var end = function(event) {
        event.preventDefault();
        keys[key] = false;
      };
      button.addEventListener("pointerdown", start);
      button.addEventListener("pointerup", end);
      button.addEventListener("pointercancel", end);
      button.addEventListener("pointerleave", end);
    }

    function setupEvents() {
      document.addEventListener("mousemove", handlePointerMove, false);
      document.addEventListener("touchmove", handlePointerMove, { passive: false });
      document.addEventListener("pointermove", handlePointerMove, false);

      window.addEventListener("keydown", handleKeyDown, false);
      window.addEventListener("keyup", handleKeyUp, false);

      startBtn.addEventListener("click", startGame);
      leaderboardBtn.addEventListener("click", showLeaderboardPanel);
      settingsBtn.addEventListener("click", showSettingsPanel);
      resumeBtn.addEventListener("click", resumeGame);
      restartBtn.addEventListener("click", restartGame);
      menuBtn.addEventListener("click", showMainMenu);
      reviveBtn.addEventListener("click", doRevive);
      pauseBtn.addEventListener("click", togglePause);
      fullscreenBtn.addEventListener("click", toggleFullscreen);
      muteBtn.addEventListener("click", function() {
        soundManager.setMuted(settings.sound !== false);
      });
      reloadBtn.addEventListener("click", function() {
        window.location.reload();
      });

      languageSelect.addEventListener("change", function() {
        settings.language = languageSelect.value;
        saveSettings();
        applyLocalization();
      });
      playerNameInput.addEventListener("input", function() {
        settings.playerName = playerNameInput.value.trim() || "Pilot";
        saveSettings();
      });
      graphicsSelect.addEventListener("change", function() {
        settings.graphics = graphicsSelect.value;
        saveSettings();
        applyGraphicsSettings();
      });
      controlSelect.addEventListener("change", function() {
        settings.controls = controlSelect.value;
        saveSettings();
      });
      soundToggle.addEventListener("change", function() {
        soundManager.setMuted(!soundToggle.checked);
      });
      motionToggle.addEventListener("change", function() {
        settings.reducedMotion = motionToggle.checked;
        saveSettings();
      });
      immortalToggle.addEventListener("change", function() {
        settings.immortalMode = immortalToggle.checked;
        saveSettings();
        updateHUD();
      });

      var touchButtons = document.querySelectorAll(".touch-btn");
      for (var i = 0; i < touchButtons.length; i++) {
        bindTouchButton(touchButtons[i]);
      }
    }

    function init() {
      applyLocalization();
      if (window.__threeLoadFailed || !window.THREE) {
        showThreeError();
        return;
      }

      createScene();
      createLights();
      createPlane();
      createOrbit();
      createSun();
      
      stars = new Stars();
      scene.add(stars.mesh);
      
      createSolarSystem();
      createLand();
      createForest();
      createCities();
      createSky();
      createWeather();
      createGameObjects();
      setupEvents();
      resetGame(false);
      showMainMenu();
      applyGraphicsSettings();
      applyLocalization();
      fetchGlobalLeaderboard();

      window.render_game_to_text = renderGameToText;
      window.advanceTime = advanceTime;
      window.__skyRunnerDebug = {
        start: startGame,
        pause: pauseGame,
        resume: resumeGame,
        reset: function() { resetGame(false); showMainMenu(); },
        setScore: function(value) { score = Math.max(0, Number(value) || 0); updateStageProgression(); updateHUD(); },
        state: function() { return JSON.parse(renderGameToText()); }
      };
      loop();
    }

    window.addEventListener("load", init, false);
  </script>
</body>
</html>
