<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Sky Runner is a polished 3D arcade flight game with local highscores, achievements, powerups, and multilingual UI." />
  <meta name="theme-color" content="#6fa7d9" />
  <meta property="og:title" content="Sky Runner - Release Edition" />
  <meta property="og:description" content="A 3D arcade flight game with global leaderboards, achievements, powerups, and RU/KK/EN UI." />
  <meta property="og:type" content="website" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2306111f'/%3E%3Cpath d='M9 36 L49 15 L42 31 L55 39 L37 40 L28 54 L25 40 Z' fill='%23ffd45a'/%3E%3Cpath d='M18 35 L42 25 L35 34 L44 38 L29 38 Z' fill='%238fd3ff'/%3E%3C/svg%3E" />
  <title>Sky Runner - Release Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Inter, "Segoe UI", Arial, Helvetica, sans-serif;
      color: #f8fbff;
      touch-action: none;
      user-select: none;
    }

    #world {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background: linear-gradient(to bottom, #07111f, #0b2a40);
    }

    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 10;
      padding: 14px 16px;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      pointer-events: none;
      text-shadow: 0 2px 10px rgba(0,0,0,0.65);
    }

    #stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      pointer-events: none;
      background: linear-gradient(135deg, rgba(10, 22, 38, 0.74), rgba(4, 10, 19, 0.56));
      border: 1px solid rgba(255,255,255,0.24);
      border-radius: 8px;
      padding: 9px 12px;
      backdrop-filter: blur(12px);
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.24);
      min-height: 36px;
    }

    .badge.small {
      font-size: 13px;
      padding: 8px 10px;
    }

    .badge strong {
      color: #ffd45a;
    }

    #help {
      max-width: 420px;
      font-size: 13px;
      line-height: 1.4;
      opacity: 0.95;
      text-align: right;
      background: rgba(7, 17, 31, 0.38);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      padding: 9px 12px;
      backdrop-filter: blur(8px);
    }

    #topControls {
      position: absolute;
      right: 16px;
      bottom: 16px;
      display: flex;
      gap: 8px;
      z-index: 15;
    }

    .icon-button {
      width: 44px;
      height: 44px;
      min-width: 44px;
      padding: 0;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      text-transform: none;
      letter-spacing: 0;
      background: rgba(7, 17, 31, 0.7);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 10px 26px rgba(0,0,0,0.22);
    }

    .icon-button:hover,
    .icon-button:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(255,255,255,0.35);
    }

    #flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255, 58, 58, 0.52), rgba(255, 58, 58, 0));
      opacity: 0;
      pointer-events: none;
      z-index: 8;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 18px;
      background: rgba(2, 6, 14, 0.68);
      pointer-events: auto;
    }

    .overlay.hidden,
    #modal.hidden,
    #menuOverlay.hidden {
      display: none;
    }

    .panel {
      width: min(94vw, 520px);
      max-height: min(92vh, 760px);
      overflow: auto;
      background: rgba(8, 16, 30, 0.94);
      color: white;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 8px;
      padding: 26px;
      text-align: center;
      box-shadow: 0 25px 80px rgba(0,0,0,0.56), inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(20px) saturate(1.18);
    }

    .release-panel {
      width: min(94vw, 760px);
      text-align: left;
    }

    .panel h1 {
      font-size: clamp(32px, 7vw, 64px);
      line-height: 0.95;
      margin-bottom: 12px;
      color: #ffffff;
      letter-spacing: 0;
    }

    .panel h2 {
      font-size: 22px;
      margin: 0 0 12px;
      color: #ffd45a;
    }

    .panel p {
      font-size: 16px;
      line-height: 1.55;
      opacity: 0.9;
      margin-bottom: 18px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px;
      margin-top: 18px;
    }

    .menu-section {
      border: 1px solid rgba(255,255,255,0.13);
      border-radius: 8px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
    }

    .menu-actions,
    .modal-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 18px;
    }

    .release-panel .menu-actions {
      justify-content: flex-start;
    }

    .stat-line,
    .setting-row,
    .leaderboard-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 14px;
    }

    .leaderboard-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 7px 9px;
      border-radius: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.86);
      font-size: 12px;
      font-weight: 800;
    }

    .leaderboard-status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffbf4d;
      box-shadow: 0 0 12px rgba(255,191,77,0.7);
    }

    .leaderboard-status.online::before {
      background: #58f29a;
      box-shadow: 0 0 12px rgba(88,242,154,0.7);
    }

    .leaderboard-status.offline::before {
      background: #ff6b57;
      box-shadow: 0 0 12px rgba(255,107,87,0.7);
    }

    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .leaderboard-table th,
    .leaderboard-table td {
      padding: 8px 6px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      text-align: right;
      white-space: nowrap;
    }

    .leaderboard-table th:first-child,
    .leaderboard-table td:first-child {
      text-align: left;
      white-space: normal;
      min-width: 110px;
    }

    .leaderboard-table th {
      color: #ffd45a;
      font-size: 12px;
      text-transform: uppercase;
    }

    .stat-line:last-child,
    .setting-row:last-child,
    .leaderboard-row:last-child,
    .leaderboard-table tr:last-child td {
      border-bottom: 0;
    }

    .setting-row label {
      font-weight: 700;
    }

    .setting-copy {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .setting-copy small {
      color: rgba(255,255,255,0.66);
      font-size: 12px;
      line-height: 1.35;
    }

    select,
    input[type="text"] {
      min-width: 150px;
      max-width: 220px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(0,0,0,0.28);
      color: #fff;
      padding: 10px 12px;
      font: inherit;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #ffd45a;
    }

    button {
      pointer-events: auto;
      border: 0;
      border-radius: 8px;
      padding: 13px 18px;
      font-weight: 800;
      font-size: 16px;
      background: #ffd45a;
      color: #06111f;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      text-transform: uppercase;
      letter-spacing: 0;
      box-shadow: 0 12px 28px rgba(0,0,0,0.25);
      min-height: 44px;
      white-space: normal;
    }

    button.secondary {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.18);
    }

    button.danger {
      background: #ff6b57;
      color: #fff;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 16px 36px rgba(0,0,0,0.32);
      outline: none;
    }

    #achievementPopup {
      position: absolute;
      top: 76px;
      left: 50%;
      transform: translate(-50%, -16px);
      z-index: 25;
      min-width: min(88vw, 360px);
      max-width: 420px;
      padding: 14px 16px;
      border-radius: 8px;
      background: rgba(6, 17, 31, 0.92);
      border: 1px solid rgba(255, 212, 90, 0.55);
      box-shadow: 0 18px 50px rgba(0,0,0,0.38);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      text-align: center;
    }

    #achievementPopup.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    #achievementTitle {
      font-weight: 900;
      color: #ffd45a;
      margin-bottom: 4px;
    }

    #achievementDesc {
      font-size: 14px;
      opacity: 0.9;
    }

    #mobileControls {
      position: absolute;
      left: 14px;
      bottom: 14px;
      z-index: 14;
      display: none;
      grid-template-columns: repeat(3, 52px);
      grid-template-rows: repeat(2, 52px);
      gap: 8px;
      opacity: 0.9;
    }

    .touch-btn {
      min-width: 52px;
      width: 52px;
      height: 52px;
      padding: 0;
      border-radius: 8px;
      background: rgba(7, 17, 31, 0.64);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      font-size: 24px;
      text-transform: none;
    }

    .touch-btn[data-key="arrowup"] { grid-column: 2; grid-row: 1; }
    .touch-btn[data-key="arrowleft"] { grid-column: 1; grid-row: 2; }
    .touch-btn[data-key="arrowdown"] { grid-column: 2; grid-row: 2; }
    .touch-btn[data-key="arrowright"] { grid-column: 3; grid-row: 2; }

    #threeError {
      position: absolute;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #06111f;
      color: #fff;
      text-align: center;
    }

    #threeError.show {
      display: flex;
    }

    .is-menu #hud,
    .is-menu #mobileControls,
    .is-menu #pauseBtn {
      display: none;
    }

    .is-playing #menuOverlay,
    .is-paused #menuOverlay,
    .is-gameover #menuOverlay {
      display: none;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 700px) {
      #hud {
        flex-direction: column;
        align-items: flex-start;
        padding: 10px;
        gap: 8px;
      }

      #stats {
        gap: 6px;
      }

      .badge {
        font-size: 12px;
        padding: 7px 8px;
        min-height: 30px;
      }

      #help {
        text-align: left;
        max-width: none;
        font-size: 12px;
        padding: 7px 8px;
      }

      .panel h1 {
        font-size: 34px;
      }

      .panel {
        padding: 18px;
      }

      .menu-grid {
        grid-template-columns: 1fr;
      }

      .setting-row {
        align-items: flex-start;
        flex-direction: column;
      }

      select,
      input[type="text"] {
        width: 100%;
        max-width: none;
      }

      #topControls {
        right: 10px;
        bottom: 10px;
      }

      #mobileControls {
        display: grid;
      }
    }
  </style>
</head>
<body class="is-menu">
  <div id="world"></div>

  <div id="hud">
    <div id="stats">
      <div class="badge"><span id="scoreLabel">Score</span>: <strong id="score">0</strong></div>
      <div class="badge"><span id="bestLabel">Best</span>: <strong id="bestScore">0</strong></div>
      <div class="badge"><span id="livesLabel">Lives</span>: <span id="lives">3</span></div>
      <div class="badge"><span id="comboLabel">Combo</span>: <strong id="combo">0</strong></div>
      <div class="badge"><span id="speedLabel">Speed</span>: <strong id="speed">1.0x</strong></div>
      <div class="badge"><span id="stageLabel">Stage</span>: <strong id="stageName">Sunny</strong></div>
      <div class="badge small" id="powerupBadge" style="display:none;"><span id="powerupLabel">Powerup</span>: <strong id="powerupText"></strong></div>
      <div class="badge small" id="cityBadge" style="display:none;"><span id="cityPrefix">Flying over</span>: <strong id="cityName">Tokyo, Japan</strong></div>
    </div>
    <div id="help"></div>
  </div>

  <div id="topControls">
    <button id="pauseBtn" class="icon-button" type="button" aria-label="Pause" title="Pause">Ⅱ</button>
    <button id="muteBtn" class="icon-button" type="button" aria-label="Mute" title="Mute">♪</button>
    <button id="fullscreenBtn" class="icon-button" type="button" aria-label="Fullscreen" title="Fullscreen">⛶</button>
  </div>

  <div id="mobileControls" aria-hidden="true">
    <button class="touch-btn" type="button" data-key="arrowup">↑</button>
    <button class="touch-btn" type="button" data-key="arrowleft">←</button>
    <button class="touch-btn" type="button" data-key="arrowdown">↓</button>
    <button class="touch-btn" type="button" data-key="arrowright">→</button>
  </div>

  <div id="flash"></div>

  <div id="menuOverlay" class="overlay">
    <div class="panel release-panel">
      <h1>Sky Runner</h1>
      <p id="menuSubtitle"></p>
      <div class="menu-actions">
        <button id="startBtn" type="button"></button>
        <button id="leaderboardBtn" class="secondary" type="button"></button>
        <button id="settingsBtn" class="secondary" type="button"></button>
      </div>
      <div class="menu-grid">
        <section class="menu-section" id="mainMenuPanel">
          <h2 id="overviewTitle"></h2>
          <div class="stat-line"><span id="menuBestLabel"></span><strong id="menuBestScore">0</strong></div>
          <div class="stat-line"><span id="menuGamesLabel"></span><strong id="menuGamesPlayed">0</strong></div>
          <div class="stat-line"><span id="menuAchievementsLabel"></span><strong id="menuAchievementCount">0/0</strong></div>
          <p id="menuControlsText" style="margin-top: 12px; margin-bottom: 0;"></p>
        </section>
        <section class="menu-section" id="sidePanel">
          <h2 id="sidePanelTitle"></h2>
          <div id="leaderboardList"></div>
          <div id="settingsPanel" class="hidden">
            <div class="setting-row">
              <label for="languageSelect" id="languageLabel"></label>
              <select id="languageSelect">
                <option value="ru">Русский</option>
                <option value="kk">Қазақша</option>
                <option value="en">English</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="playerNameInput" id="playerNameLabel"></label>
              <input id="playerNameInput" type="text" maxlength="16" autocomplete="off" />
            </div>
            <div class="setting-row">
              <label for="graphicsSelect" id="graphicsLabel"></label>
              <select id="graphicsSelect">
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="controlSelect" id="controlLabel"></label>
              <select id="controlSelect">
                <option value="hybrid">Hybrid</option>
                <option value="pointer">Pointer</option>
                <option value="keyboard">Keyboard</option>
              </select>
            </div>
            <div class="setting-row">
              <label for="soundToggle" id="soundLabel"></label>
              <input id="soundToggle" type="checkbox" />
            </div>
            <div class="setting-row">
              <label for="motionToggle" id="motionLabel"></label>
              <input id="motionToggle" type="checkbox" />
            </div>
            <div class="setting-row">
              <div class="setting-copy">
                <label for="immortalToggle" id="immortalLabel"></label>
                <small id="immortalNote"></small>
              </div>
              <input id="immortalToggle" type="checkbox" />
            </div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <div id="modal" class="overlay hidden">
    <div class="panel">
      <h1 id="modalTitle">Game Over</h1>
      <p id="modalText">Try again and collect more rings!</p>
      <div id="runSummary" class="stat-line" style="display:none;"><span id="runSummaryLabel"></span><strong id="runSummaryScore"></strong></div>
      <div class="modal-actions">
        <button id="resumeBtn" class="secondary" type="button" style="display:none;"></button>
        <button id="reviveBtn" class="danger" type="button" style="display:none;"></button>
        <button id="restartBtn" type="button"></button>
        <button id="menuBtn" class="secondary" type="button"></button>
      </div>
    </div>
  </div>

  <div id="achievementPopup">
    <div id="achievementTitle"></div>
    <div id="achievementDesc"></div>
  </div>

  <div id="threeError">
    <div class="panel">
      <h1>Sky Runner</h1>
      <p id="threeErrorText">Three.js could not be loaded. Check the connection and reload the page.</p>
      <button id="reloadBtn" type="button">Reload</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/86/three.min.js" onerror="window.__threeLoadFailed=true"></script>
  <script>
    var STORAGE_KEYS = {
      settings: "skyRunnerRelease.settings",
      highScores: "skyRunnerRelease.highScores",
      achievements: "skyRunnerRelease.achievements",
      stats: "skyRunnerRelease.stats",
      clientId: "skyRunnerRelease.clientId",
      lastScoreSync: "skyRunnerRelease.lastScoreSync"
    };

    var GLOBAL_LEADERBOARD_ENDPOINT = "https://mantledb.sh/v2/sky-runner-gold/leaderboard";
    var LOCAL_SCORE_LIMIT = 100;
    var GLOBAL_SCORE_LIMIT = 250;
    var GLOBAL_SYNC_COOLDOWN_MS = 3500;
    var SCORE_LIMITS = {
      score: 2000000,
      combo: 1200,
      rings: 5000,
      distance: 20000000,
      runTime: 7200
    };

    var defaultSettings = {
      language: "ru",
      playerName: "Pilot",
      graphics: "high",
      controls: "hybrid",
      sound: true,
      reducedMotion: false,
      immortalMode: false
    };

    var defaultStats = {
      gamesPlayed: 0,
      totalScore: 0,
      totalRings: 0,
      totalDistance: 0,
      bestCombo: 0,
      totalRevives: 0
    };

    function loadJSON(key, fallback) {
      try {
        var raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function saveJSON(key, value) {
      try {
        localStorage.setItem(key, JSON.stringify(value));
      } catch (e) {}
    }

    function mergeObject(base, saved) {
      var out = {};
      Object.keys(base).forEach(function(key) {
        out[key] = base[key];
      });
      if (saved) {
        Object.keys(saved).forEach(function(key) {
          if (key in out) out[key] = saved[key];
        });
      }
      return out;
    }

    function normalizeSettings(saved) {
      var next = mergeObject(defaultSettings, saved);
      if (["ru", "kk", "en"].indexOf(next.language) === -1) next.language = defaultSettings.language;
      if (["low", "medium", "high"].indexOf(next.graphics) === -1) next.graphics = defaultSettings.graphics;
      if (["hybrid", "pointer", "keyboard"].indexOf(next.controls) === -1) next.controls = defaultSettings.controls;
      next.playerName = normalizePlayerName(next.playerName || defaultSettings.playerName);
      next.sound = next.sound !== false;
      next.reducedMotion = next.reducedMotion === true;
      next.immortalMode = next.immortalMode === true;
      return next;
    }

    function normalizeStats(saved) {
      var next = mergeObject(defaultStats, saved);
      Object.keys(defaultStats).forEach(function(key) {
        next[key] = Math.max(0, Math.round(Number(next[key]) || 0));
      });
      return next;
    }

    var settings = normalizeSettings(loadJSON(STORAGE_KEYS.settings, null));
    var savedHighScores = loadJSON(STORAGE_KEYS.highScores, []);
    var highScores = Array.isArray(savedHighScores) ? savedHighScores : [];
    var globalHighScores = [];
    var savedAchievements = loadJSON(STORAGE_KEYS.achievements, []);
    var unlockedAchievements = Array.isArray(savedAchievements) ? savedAchievements : [];
    var stats = normalizeStats(loadJSON(STORAGE_KEYS.stats, null));
    var leaderboardStatus = "loading";
    var leaderboardSyncing = false;
    var cachedBestScore = null;
    var gameMode = "menu";
    var gameClock = 0;
    var lastFrameTime = 0;
    var currentSidePanel = "leaderboard";
    var runSaved = false;

    var I18N = {
      ru: {
        menuSubtitle: "Полет через погоду, города и космос. Собирай кольца, держи комбо и используй усиления.",
        start: "Старт",
        leaderboard: "Рекорды",
        settings: "Настройки",
        overview: "Профиль",
        bestRun: "Лучший счет",
        gamesPlayed: "Запуски",
        achievements: "Достижения",
        controlsIntro: "Управление: мышь, тач, WASD или стрелки. P/Esc - пауза, F - полный экран, M - звук.",

    var soundManager = {
      audioContext: null,
      musicNodes: [],
      musicPlaying: false,
      muted: settings.sound === false,
      init: function() {
        if (this.audioContext) return;
        try {
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch(e) {}
      },
      ensureReady: function() {
        this.init();
        if (this.audioContext && this.audioContext.state === "suspended") {
          this.audioContext.resume();
        }
      },
      isSilent: function() {
        return this.muted || settings.sound === false;
      },
      setMuted: function(value) {
        this.muted = value;
        settings.sound = !value;
        saveSettings();
        if (value) {
          this.stopMusic();
        } else if (gameMode === "playing") {
          this.ensureReady();

      playCollect: function() {
        if (!this.audioContext || this.isSilent()) return;
        var o = this.audioContext.createOscillator();
        var g = this.audioContext.createGain();
        o.connect(g);
        g.connect(this.audioContext.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(880, this.audioContext.currentTime);
        o.frequency.exponentialRampToValueAtTime(1760, this.audioContext.currentTime + 0.15);
        g.gain.setValueAtTime(0.4, this.audioContext.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, this.audioContext.currentTime + 0.25);
        o.start(this.audioContext.currentTime);
        o.stop(this.audioContext.currentTime + 0.25);
      },

        if (!this.audioContext || this.isSilent()) return;
        var o = this.audioContext.createOscillator();
        var g = this.audioContext.createGain();
        o.connect(g);
        g.connect(this.audioContext.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(150, this.audioContext.currentTime);
        o.frequency.exponentialRampToValueAtTime(50, this.audioContext.currentTime + 0.4);
        g.gain.setValueAtTime(0.5, this.audioContext.currentTime);

        o.frequency.setValueAtTime(440, this.audioContext.currentTime);

        if (!this.audioContext || this.isSilent()) return;
        var now = this.audioContext.currentTime;
        [523, 659, 784].forEach(function(freq, i) {

          var g = soundManager.audioContext.createGain();

          g.gain.exponentialRampToValueAtTime(0.01, now + 0.35 + i * 0.08);

            }, 1000);
          })(node);
        }
        this.musicNodes = [];
      }

      var rings = normalizeScoreNumber(entry.rings, SCORE_LIMITS.rings);
      var distance = normalizeScoreNumber(entry.distance, SCORE_LIMITS.distance);
      var runTime = Math.min(SCORE_LIMITS.runTime, Math.max(0, Number(entry.runTime) || 0));
      var stage = clamp(Math.round(Number(entry.stage) || 0), 0, 3);
      var date = normalizeScoreDate(entry.date);
      var rawId = String(entry.id || makeLegacyScoreId(entry, name, score, date));
      var id = rawId.replace(/[^a-z0-9а-яёқңғүұәөһі._:-]/gi, "").slice(0, 96) || makeLegacyScoreId(entry, name, score, date);
      if (!name || score < 0 || score > SCORE_LIMITS.score) return null;
      if (combo > SCORE_LIMITS.combo || rings > SCORE_LIMITS.rings || distance > SCORE_LIMITS.distance || runTime > SCORE_LIMITS.runTime) return null;
      return {
        id: id,
        name: name,
        score: score,
        combo: combo,
        stage: stage,
        rings: rings,
        distance: distance,
        runTime: Number(runTime.toFixed(1)),
        date: date
      };
    }

    function normalizeScoreEntries(entries) {
      if (!Array.isArray(entries)) return [];
      return entries.map(function(entry) {
        return sanitizeScoreEntry(entry);
      }).filter(function(entry) {
        return !!entry;
      });
    }

    function mergeScoreEntries(localEntries, remoteEntries) {
      var byId = {};
      normalizeScoreEntries(remoteEntries).concat(normalizeScoreEntries(localEntries)).forEach(function(entry) {
        byId[entry.id] = entry;
      });
      return Object.keys(byId).map(function(id) { return byId[id]; }).sort(function(a, b) {
        if (b.score !== a.score) return b.score - a.score;
        if (b.combo !== a.combo) return b.combo - a.combo;
        return String(b.date).localeCompare(String(a.date));
      });
    }

    function getAllScoreEntries() {
      return mergeScoreEntries(highScores, globalHighScores);
    }

    function invalidateBestScore() {
      cachedBestScore = null;
    }

    highScores = normalizeScoreEntries(highScores).slice(0, LOCAL_SCORE_LIMIT);
    saveJSON(STORAGE_KEYS.highScores, highScores);

    function setLeaderboardStatus(status) {
      leaderboardStatus = status;
      if (currentSidePanel === "leaderboard") renderLeaderboard();
    }

    function fetchGlobalLeaderboard() {
      if (!GLOBAL_LEADERBOARD_ENDPOINT || !window.fetch) {
        setLeaderboardStatus("offline");
        return Promise.resolve([]);
      }
      setLeaderboardStatus("loading");
      return fetch(GLOBAL_LEADERBOARD_ENDPOINT + "?t=" + Date.now(), {
        method: "GET",
        headers: { "Accept": "application/json" },
        cache: "no-store"
      }).then(function(response) {
        if (!response.ok) throw new Error("Leaderboard GET " + response.status);
        return response.json();
      }).then(function(data) {
        globalHighScores = normalizeScoreEntries(data && (data.scores || (data.data && data.data.scores)));
        invalidateBestScore();
        setLeaderboardStatus("online");
        renderMenuStats();
        return globalHighScores;
      }).catch(function() {
        setLeaderboardStatus("offline");
        return [];
      });
    }

    function syncGlobalScore(entry) {
      if (!GLOBAL_LEADERBOARD_ENDPOINT || !window.fetch || leaderboardSyncing) return;
      if (settings.immortalMode) return;
      var now = Date.now();
      var lastSync = Number(loadJSON(STORAGE_KEYS.lastScoreSync, 0)) || 0;
      if (now - lastSync < GLOBAL_SYNC_COOLDOWN_MS) {
        return;
      }
      saveJSON(STORAGE_KEYS.lastScoreSync, now);
      leaderboardSyncing = true;
      setLeaderboardStatus("saving");
      fetch(GLOBAL_LEADERBOARD_ENDPOINT + "?t=" + Date.now(), {
        method: "GET",
        headers: { "Accept": "application/json" },
        cache: "no-store"
      }).then(function(response) {
        if (!response.ok) throw new Error("Leaderboard GET " + response.status);
        return response.json();
      }).then(function(data) {
        var merged = mergeScoreEntries(highScores.concat([entry]), data && (data.scores || (data.data && data.data.scores))).slice(0, GLOBAL_SCORE_LIMIT);
        return fetch(GLOBAL_LEADERBOARD_ENDPOINT, {
          method: "POST",
          headers: { "Content-Type": "application/json", "Accept": "application/json" },
          body: JSON.stringify({ version: 1, updatedAt: new Date().toISOString(), scores: merged })
        }).then(function(response) {
          if (!response.ok) throw new Error("Leaderboard POST " + response.status);
          globalHighScores = merged;
          invalidateBestScore();
          setLeaderboardStatus("online");
        });
      }).catch(function() {
        setLeaderboardStatus("offline");
      }).then(function() {
        leaderboardSyncing = false;
        renderLeaderboard();
      });
    }

    function getBestScore() {
      if (cachedBestScore !== null) return cachedBestScore;
      var best = 0;
      var entries = getAllScoreEntries();
      for (var i = 0; i < entries.length; i++) {
        best = Math.max(best, Number(entries[i].score) || 0);
      }
      cachedBestScore = best;
      return cachedBestScore;
    }

    function normalizePlayerName(name) {
      var clean = String(name || "Pilot").trim().replace(/\s+/g, " ").slice(0, 16);
      return clean || "Pilot";
    }

    function getLeaderboardRows() {
      var players = {};
      var entries = getAllScoreEntries();
      for (var i = 0; i < entries.length; i++) {
        var entry = entries[i] || {};
        var name = normalizePlayerName(entry.name);
        if (!players[name]) {
          players[name] = { name: name, best: 0, runs: 0, bestCombo: 0, lastScore: 0, lastDate: "", stage: 0 };
        }
        var row = players[name];
        var entryScore = Number(entry.score) || 0;
        var entryCombo = Number(entry.combo) || 0;
        row.runs += 1;
        row.best = Math.max(row.best, entryScore);
        row.bestCombo = Math.max(row.bestCombo, entryCombo);
        row.stage = Math.max(row.stage, Number(entry.stage) || 0);
        if (!row.lastDate || String(entry.date || "") > row.lastDate) {
          row.lastDate = String(entry.date || "");
          row.lastScore = entryScore;
        }
      }
      return Object.keys(players).map(function(name) { return players[name]; }).sort(function(a, b) {
        if (b.best !== a.best) return b.best - a.best;
        if (b.bestCombo !== a.bestCombo) return b.bestCombo - a.bestCombo;
        return b.runs - a.runs;
      });
    }

    function saveHighScore() {
      if (runSaved || (score <= 0 && runTime < 1)) return;
      runSaved = true;
      if (settings.immortalMode) {
        renderMenuStats();
        renderLeaderboard();
        return;
      }
      var entry = sanitizeScoreEntry({
        id: makeRunId(),
        name: normalizePlayerName(settings.playerName),
        score: score,
        combo: bestComboThisRun,
        stage: currentStage,
        rings: ringsCollectedThisRun,
        distance: Math.round(distance),
        runTime: Number(runTime.toFixed(1)),
        date: new Date().toISOString()
      });
      if (!entry) return;
      highScores.push(entry);
      highScores.sort(function(a, b) {
        return String(b.date || "").localeCompare(String(a.date || ""));
      });
      highScores = normalizeScoreEntries(highScores).slice(0, LOCAL_SCORE_LIMIT);
      saveJSON(STORAGE_KEYS.highScores, highScores);
      invalidateBestScore();
      stats.totalScore += score;
      stats.totalRings += ringsCollectedThisRun;
      stats.totalDistance += Math.round(distance);
      stats.bestCombo = Math.max(stats.bestCombo || 0, bestComboThisRun);
      saveStats();
      renderMenuStats();
      renderLeaderboard();
      syncGlobalScore(entry);
    }

    function escapeHTML(value) {
      return String(value).replace(/[&<>"']/g, function(ch) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[ch];
      });
    }

      if (!rows.length) {

        '<th>' + escapeHTML(t("leaderboardPlayer")) + '</th>' +
        '<th>' + escapeHTML(t("leaderboardBest")) + '</th>' +
        '<th>' + escapeHTML(t("leaderboardRuns")) + '</th>' +
        '<th>' + escapeHTML(t("leaderboardCombo")) + '</th>' +
        '<th>' + escapeHTML(t("leaderboardLast")) + '</th>' +
        '</tr></thead><tbody>';
      html += rows.slice(0, 12).map(function(row, index) {
        return '<tr><td>#' + (index + 1) + ' ' + escapeHTML(row.name) + '</td>' +
          '<td><strong>' + row.best + '</strong></td>' +
          '<td>' + row.runs + '</td>' +

      }).join("");

    function createScene() {
      HEIGHT = window.innerHeight;
      WIDTH = window.innerWidth;

      scene = new THREE.Scene();
      scene.fog = new THREE.FogExp2(0x000000, 0.0006); // Fog density that looks good for atmospheric perspective

      aspectRatio = WIDTH / HEIGHT;
      fieldOfView = 60;
      nearPlane = 1;
      farPlane = 10000;

      camera = new THREE.PerspectiveCamera(
        fieldOfView,
        aspectRatio,
        nearPlane,
        farPlane
      );

      camera.position.x = 0;
      camera.position.y = 150;
      camera.position.z = 100;

      renderer = new THREE.WebGLRenderer({
        alpha: true,
        antialias: getQualityConfig().antialias,
        powerPreference: "high-performance"
      });
      renderer.setClearColor(0x000000, 0);
      renderer.gammaInput = true;
      renderer.gammaOutput = true;

      renderer.setSize(WIDTH, HEIGHT);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, getQualityConfig().pixelRatioCap));
      renderer.shadowMap.enabled = settings.graphics !== "low";

      container = document.getElementById("world");
      container.appendChild(renderer.domElement);

      window.addEventListener("resize", handleWindowResize, false);
    }

    function handleWindowResize() {
      HEIGHT = window.innerHeight;
      WIDTH = window.innerWidth;
      renderer.setSize(WIDTH, HEIGHT);
      camera.aspect = WIDTH / HEIGHT;
      camera.updateProjectionMatrix();
    }

    function createLights() {
      hemisphereLight = new THREE.HemisphereLight(0xddeeff, 0x1d2f1d, 0.85);
      shadowLight = new THREE.DirectionalLight(0xfff4dc, 1.35);

      shadowLight.position.set(-220, 520, 480);
      shadowLight.castShadow = true;

      shadowLight.shadow.camera.left = -700;
      shadowLight.shadow.camera.right = 700;
      shadowLight.shadow.camera.top = 700;
      shadowLight.shadow.camera.bottom = -700;
      shadowLight.shadow.camera.near = 1;
      shadowLight.shadow.camera.far = 1200;

      var quality = getQualityConfig();
      shadowLight.shadow.mapSize.width = quality.shadowSize;
      shadowLight.shadow.mapSize.height = quality.shadowSize;
      shadowLight.shadow.bias = -0.0001;

      scene.add(hemisphereLight);
      scene.add(shadowLight);
      
      var ambientLight = new THREE.AmbientLight(0x2b3440, 0.35);
      var rimLight = new THREE.DirectionalLight(0x9fd8ff, 0.45);
      rimLight.position.set(420, 180, -520);
      scene.add(ambientLight);
      scene.add(rimLight);
    }

    Land = function () {
      var geom = new THREE.CylinderGeometry(3000, 3000, 4000, 40, 10);
      
      // Add slight bumps for low poly look
      for (var i = 0; i < geom.vertices.length; i++) {
        var v = geom.vertices[i];
        v.x += -15 + Math.random() * 30;
        v.y += -15 + Math.random() * 30;
        v.z += -15 + Math.random() * 30;
      }
      geom.computeFaceNormals();

      var mat = new THREE.MeshStandardMaterial({
        color: 0x2f9b4b,
        roughness: 0.96,
        metalness: 0.02,
        flatShading: true
      });

      this.mesh = new THREE.Mesh(geom, mat);
      this.mesh.rotation.x = -Math.PI / 2;
      this.mesh.receiveShadow = true;
    };

    SolarSystem = function() {
      this.mesh = new THREE.Object3D();
      this.planets = [];
      
      var createPlanet = function(radius, color, x, z) {
         var geom = new THREE.IcosahedronGeometry(radius, 2); // Smoother planets
         var mat = new THREE.MeshStandardMaterial({ color: color, roughness: 0.8, flatShading: true });
         var p = new THREE.Mesh(geom, mat);
         p.position.set(x, 0, z);
         return p;
      };

      this.sun = createPlanet(200, 0xffbb00, 0, -800);
      this.sun.material = new THREE.MeshBasicMaterial({color: 0xffaa00});
      var sunAura = new THREE.Mesh(
         new THREE.SphereGeometry(240, 20, 20),
         new THREE.MeshBasicMaterial({ color: 0xff4400, transparent: true, opacity: 0.3 })
      );
      this.sun.add(sunAura);
      this.mesh.add(this.sun);
      
      this.mercury = createPlanet(15, 0x888888, -250, -800);
      this.mesh.add(this.mercury);
      this.planets.push(this.mercury);

      this.venus = createPlanet(35, 0xffddaa, 250, -750);
      this.mesh.add(this.venus);
      this.planets.push(this.venus);

      this.earth = createPlanet(40, 0x2266cc, -450, -700);
      this.mesh.add(this.earth);
      this.planets.push(this.earth);
      
      this.mars = createPlanet(25, 0xcc4422, 350, -900);
      this.mesh.add(this.mars);
      this.planets.push(this.mars);
      
      this.jupiter = createPlanet(90, 0xccaa88, 650, -1000);
      this.mesh.add(this.jupiter);
      this.planets.push(this.jupiter);
      
      this.saturn = createPlanet(70, 0xeeddcc, -750, -1100);
      var ringGeom = new THREE.TorusGeometry(120, 15, 2, 30);
      var ringMat = new THREE.MeshStandardMaterial({color: 0xaa9988, flatShading: true});
      var ring = new THREE.Mesh(ringGeom, ringMat);
      ring.rotation.x = Math.PI / 2.5;
      this.saturn.add(ring);
      this.mesh.add(this.saturn);
      this.planets.push(this.saturn);

      this.uranus = createPlanet(50, 0xadd8e6, 500, -1300);
      var uRing = new THREE.Mesh(new THREE.TorusGeometry(80, 5, 2, 20), ringMat);
      uRing.rotation.x = Math.PI / 2; // Vertical ring
      this.uranus.add(uRing);
      this.mesh.add(this.uranus);
      this.planets.push(this.uranus);

      this.neptune = createPlanet(48, 0x00008b, -400, -1500);

    Cloud = function () {

        m.position.y = Math.random() * 10;

    Sky = function () {
      this.mesh = new THREE.Object3D();
      this.nClouds = getQualityConfig().clouds;

      var stepAngle = Math.PI * 2 / this.nClouds;

      for (var i = 0; i < this.nClouds; i++) {
        var c = new Cloud();

        var a = stepAngle * i;
        var h = 3200 + Math.random() * 200;

        c.mesh.position.y = Math.sin(a) * h;
        c.mesh.position.x = Math.cos(a) * h;
        c.mesh.rotation.z = a + Math.PI / 2;
        c.mesh.position.z = -400 - Math.random() * 400;

      }

    Tree = function () {

      });

      leaf2.position.set(-8, 25, 8);

    City = function() {
       this.mesh = new THREE.Object3D();
       this.style = "AMERICAN";
    };

    City.prototype.build = function(style) {
       this.style = style;
       while(this.mesh.children.length > 0) { 
           this.mesh.remove(this.mesh.children[0]); 
       }
       
       var quality = getQualityConfig();
       var nBuildings = quality.buildingMin + Math.floor(Math.random() * quality.buildingRange);
       var mat1, mat2;
       
       if (style === "AMERICAN") {
          mat1 = new THREE.MeshStandardMaterial({color: 0x223344, roughness: 0.2, metalness: 0.8});
          mat2 = new THREE.MeshStandardMaterial({color: 0x445566, roughness: 0.3, metalness: 0.7});
          for(var i=0; i<nBuildings; i++) {
             var h = 40 + Math.random() * 80;
             var w = 15 + Math.random() * 15;
             var b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), Math.random()>0.5?mat1:mat2);
             b.position.set(rand(-120, 120), h/2, rand(-80, 80));
             this.mesh.add(b);
          }
       } else if (style === "ASIAN") {
          mat1 = new THREE.MeshStandardMaterial({color: 0xaa2222, roughness: 0.7});
          mat2 = new THREE.MeshStandardMaterial({color: 0x222222, roughness: 0.9});
          for(var i=0; i<nBuildings; i++) {
             var h = 20 + Math.random() * 40;
             var w = 15 + Math.random() * 10;
             var b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat1);
             b.position.set(rand(-120, 120), h/2, rand(-80, 80));
             var roof = new THREE.Mesh(new THREE.ConeGeometry(w*1.2, 10, 4), mat2);
             roof.position.y = h/2 + 5;
             roof.rotation.y = Math.PI/4;
             b.add(roof);
             this.mesh.add(b);
          }
       } else if (style === "RUSSIAN") {
          mat1 = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.9});
          var colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffaa00];
          for(var i=0; i<nBuildings; i++) {
             var h = 20 + Math.random() * 30;
             var w = 15 + Math.random() * 10;
             var b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat1);
             b.position.set(rand(-120, 120), h/2, rand(-80, 80));
             var domeMat = new THREE.MeshStandardMaterial({color: colors[Math.floor(Math.random()*colors.length)], roughness: 0.5});
             var dome = new THREE.Mesh(new THREE.SphereGeometry(w*0.6, 8, 8), domeMat);
             dome.position.y = h/2 + w*0.4;
             dome.scale.y = 1.5;
             b.add(dome);
             this.mesh.add(b);
          }
       } else if (style === "MIDDLE_EASTERN") {
          mat1 = new THREE.MeshStandardMaterial({color: 0xeeddaa, roughness: 0.9});
          for(var i=0; i<nBuildings; i++) {
             if (Math.random() > 0.8) {
               var w = 40 + Math.random() * 40;
               var b = new THREE.Mesh(new THREE.ConeGeometry(w, w*0.8, 4), mat1);
               b.position.set(rand(-120, 120), w*0.4, rand(-80, 80));
               b.rotation.y = Math.PI/4;
               this.mesh.add(b);
             } else {
               var h = 10 + Math.random() * 20;
               var w = 15 + Math.random() * 15;
               var b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat1);
               b.position.set(rand(-120, 120), h/2, rand(-80, 80));
               this.mesh.add(b);
             }
          }
       } else if (style === "MODERN") {
          mat1 = new THREE.MeshStandardMaterial({color: 0xffffff, roughness: 0.5});
          for(var i=0; i<nBuildings; i++) {
             var h = 30 + Math.random() * 50;
             var r = 10 + Math.random() * 10;
             var b = new THREE.Mesh(new THREE.CylinderGeometry(r, r, h, 16), mat1);
             b.position.set(rand(-120, 120), h/2, rand(-80, 80));
             this.mesh.add(b);
          }
       } else { // EUROPEAN
          mat1 = new THREE.MeshStandardMaterial({color: 0xddddcc, roughness: 0.9});
          mat2 = new THREE.MeshStandardMaterial({color: 0x883322, roughness: 0.9});
          for(var i=0; i<nBuildings; i++) {
             var h = 20 + Math.random() * 20;
             var w = 20 + Math.random() * 10;
             var b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat1);
             b.position.set(rand(-120, 120), h/2, rand(-80, 80));
             var roof = new THREE.Mesh(new THREE.ConeGeometry(w*0.8, 10, 4), mat2);
             roof.position.y = h/2 + 5;
             roof.rotation.y = Math.PI/4;
             b.add(roof);
             this.mesh.add(b);
          }
       }
       
       this.mesh.traverse(function(child) {
          if (child instanceof THREE.Mesh) {
             child.castShadow = settings.graphics === "high";
             child.receiveShadow = settings.graphics !== "low";
          }
       });
    };

    Flower = function () {
      this.mesh = new THREE.Object3D();

      var stemMat = new THREE.MeshPhongMaterial({
        color: Colors.green,
        flatShading: true
      });

      var stem = new THREE.Mesh(new THREE.BoxGeometry(5, 50, 5), stemMat);
      stem.position.y = 25;
      stem.castShadow = false;
      stem.receiveShadow = true;
      this.mesh.add(stem);

      var coreMat = new THREE.MeshPhongMaterial({
        color: Colors.yellow,
        flatShading: true
      });

      var core = new THREE.Mesh(new THREE.SphereGeometry(6, 8, 8), coreMat);
      core.position.y = 50;
      core.castShadow = false;
      core.receiveShadow = true;
      this.mesh.add(core);

      var petalColors = [Colors.red, Colors.yellow, Colors.blue];

      var petalMat = new THREE.MeshBasicMaterial({ color: petalColor });
      for (var i = 0; i < 4; i++) {
        var petal = new THREE.Mesh(new THREE.BoxGeometry(15, 20, 3), petalMat);

      }

    Forest = function () {
      this.mesh = new THREE.Object3D();
      this.trees = [];

      this.nTrees = getQualityConfig().trees;
      var stepAngle = Math.PI * 2 / this.nTrees;

      for (var i = 0; i < this.nTrees; i++) {
        var t = new Tree();
        this.trees.push(t);
        
        var a = stepAngle * i;
        var h = 3005;

        t.mesh.position.y = Math.sin(a) * h;
        t.mesh.position.x = Math.cos(a) * h;
        t.mesh.rotation.z = a + (Math.PI / 2) * 3;
        t.mesh.position.z = 0 - Math.random() * 600;

        // Base scale is already set in Tree constructor, but let's re-apply it here just in case
        t.angle = a; // Store angle to calculate global position later

        this.mesh.add(t.mesh);
      }

      this.nFlowers = getQualityConfig().flowers;
      stepAngle = Math.PI * 2 / this.nFlowers;

      for (var j = 0; j < this.nFlowers; j++) {
        var f = new Flower();
        var b = stepAngle * j;
        var hh = 3005;

        f.mesh.position.y = Math.sin(b) * hh;
        f.mesh.position.x = Math.cos(b) * hh;
        f.mesh.rotation.z = b + (Math.PI / 2) * 3;
        f.mesh.position.z = 0 - Math.random() * 600;

        var fs = 0.1 + Math.random() * 0.3;
        f.mesh.scale.set(fs, fs, fs);

        this.mesh.add(f.mesh);
      }
    };

    AirPlane = function () {
      this.mesh = new THREE.Object3D();

      var mainMat = new THREE.MeshStandardMaterial({ color: 0xd9dde3, roughness: 0.28, metalness: 0.72, flatShading: true });
      var darkMat = new THREE.MeshStandardMaterial({ color: 0x171b22, roughness: 0.42, metalness: 0.86, flatShading: true });
      var stripeMat = new THREE.MeshStandardMaterial({ color: 0x2f80ff, roughness: 0.35, metalness: 0.35, flatShading: true });
      var glassMat = new THREE.MeshStandardMaterial({
        color: 0x88ccff,
        transparent: true,
        opacity: 0.6,
        roughness: 0.1,
        metalness: 0.9,
        flatShading: true
      });

      // Fuselage (Cylinder)
      var geomFuselage = new THREE.CylinderGeometry(15, 8, 80, 10);
      geomFuselage.rotateZ(Math.PI / 2);
      var fuselage = new THREE.Mesh(geomFuselage, mainMat);
      fuselage.castShadow = true;
      fuselage.receiveShadow = true;
      this.mesh.add(fuselage);

      var stripe = new THREE.Mesh(new THREE.BoxGeometry(42, 3, 3), stripeMat);
      stripe.position.set(2, 10, 13);
      stripe.castShadow = true;
      this.mesh.add(stripe);
      var stripe2 = stripe.clone();
      stripe2.position.z = -13;
      this.mesh.add(stripe2);

      // Nose
      var geomNose = new THREE.CylinderGeometry(2, 15, 20, 10);
      geomNose.rotateZ(Math.PI / 2);
      var nose = new THREE.Mesh(geomNose, mainMat);
      nose.position.x = 50;
      nose.castShadow = true;
      nose.receiveShadow = true;
      this.mesh.add(nose);

      // Cockpit Glass
      var geomGlass = new THREE.CylinderGeometry(8, 12, 30, 6);
      geomGlass.rotateZ(Math.PI / 2);
      var glass = new THREE.Mesh(geomGlass, glassMat);
      glass.position.set(15, 10, 0);
      this.mesh.add(glass);

      // Swept Wings
      var geomWing = new THREE.BoxGeometry(30, 4, 120);
      var wing = new THREE.Mesh(geomWing, mainMat);
      wing.position.set(-5, 0, 0);
      wing.rotation.y = Math.PI / 8; // Swept back
      wing.castShadow = true;
      wing.receiveShadow = true;
      this.mesh.add(wing);
      var wingStripe = new THREE.Mesh(new THREE.BoxGeometry(20, 5, 98), stripeMat);
      wingStripe.position.set(-7, 3, 0);
      wingStripe.rotation.y = Math.PI / 8;
      this.mesh.add(wingStripe);

      // Tail Fin
      var geomTail = new THREE.BoxGeometry(25, 25, 4);
      var tail = new THREE.Mesh(geomTail, mainMat);
      tail.position.set(-35, 15, 0);
      tail.rotation.z = -Math.PI / 6; // Swept back
      tail.castShadow = true;
      tail.receiveShadow = true;
      this.mesh.add(tail);
      
      // Horizontal Stabilizers
      var geomStab = new THREE.BoxGeometry(15, 2, 40);
      var stab = new THREE.Mesh(geomStab, mainMat);
      stab.position.set(-35, 0, 0);
      this.mesh.add(stab);

      // Jet Engines on wings
      var geomEngine = new THREE.CylinderGeometry(6, 6, 25, 8);
      geomEngine.rotateZ(Math.PI / 2);
      var engineR = new THREE.Mesh(geomEngine, darkMat);
      engineR.position.set(-5, -5, 30);
      this.mesh.add(engineR);
      
      var engineL = engineR.clone();
      engineL.position.set(-5, -5, -30);
      this.mesh.add(engineL);

      // Sleek Propeller
      this.propeller = new THREE.Object3D();
      var geomProp = new THREE.CylinderGeometry(0, 3, 10, 6);
      geomProp.rotateZ(Math.PI / 2);
      var spinner = new THREE.Mesh(geomProp, darkMat);
      this.propeller.add(spinner);
      
      var blade1 = new THREE.Mesh(new THREE.BoxGeometry(1, 40, 4), darkMat);
      blade1.position.set(2, 0, 0);
      this.propeller.add(blade1);
      
      var blade2 = new THREE.Mesh(new THREE.BoxGeometry(1, 4, 40), darkMat);
      blade2.position.set(2, 0, 0);
      this.propeller.add(blade2);

      this.propeller.position.set(60, 0, 0);
      this.mesh.add(this.propeller);
    };

    Ring = function () {
      this.mesh = new THREE.Object3D();

        color: 0xffd84d,
        emissive: 0x553300,
        roughness: 0.22,
        metalness: 0.85,
        flatShading: true
      });

      var ringGeom = new THREE.TorusGeometry(18, 5, 8, 16);
      this.torus = new THREE.Mesh(ringGeom, ringMat);
      this.torus.castShadow = true;
      this.torus.receiveShadow = true;
      this.mesh.add(this.torus);

      var spark = new THREE.Mesh(

        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );

    };

    Obstacle = function (stage) {
      this.mesh = new THREE.Object3D();
      this.type = stage !== undefined ? stage : 3;

      if (this.type === 0) { // Bird
        var bodyMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, flatShading: true });
        var beakMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, roughness: 0.6, flatShading: true });
        var body = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 20), bodyMat);
        var wing = new THREE.Mesh(new THREE.BoxGeometry(30, 2, 10), bodyMat);
        var beak = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 10), beakMat);
        wing.position.y = 5;
        beak.position.z = 15;
        this.mesh.add(body);
        this.mesh.add(wing);
        this.mesh.add(beak);
      } else if (this.type === 1) { // Ice block
        var iceMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.8, roughness: 0.2, metalness: 0.1, flatShading: true });
        var ice = new THREE.Mesh(new THREE.IcosahedronGeometry(15, 0), iceMat);
        var spike = new THREE.Mesh(new THREE.CylinderGeometry(0, 5, 25, 4), iceMat);
        spike.position.y = 10;
        this.mesh.add(ice);
        this.mesh.add(spike);
      } else if (this.type === 2) { // Storm Cloud
        var cloudMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 1.0, flatShading: true });
        var cloud = new THREE.Mesh(new THREE.DodecahedronGeometry(18, 0), cloudMat);
        var sparkMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
        var spark = new THREE.Mesh(new THREE.BoxGeometry(4, 15, 4), sparkMat);
        spark.position.y = -10;
        this.mesh.add(cloud);
        this.mesh.add(spark);
      } else { // Meteor
        var rockMat = new THREE.MeshStandardMaterial({ color: 0x5a4335, roughness: 0.86, metalness: 0.18, flatShading: true });
        var glowMat = new THREE.MeshBasicMaterial({ color: 0xff6b1a, transparent: true, opacity: 0.2 });
        var flameMat = new THREE.MeshBasicMaterial({ color: 0xff9b33, transparent: true, opacity: 0.34 });
        var rock = new THREE.Mesh(new THREE.IcosahedronGeometry(18, 1), rockMat);
        var glow = new THREE.Mesh(new THREE.IcosahedronGeometry(26, 1), glowMat);
        var trail = new THREE.Mesh(new THREE.ConeGeometry(14, 54, 8), flameMat);
        trail.position.z = -38;
        trail.rotation.x = Math.PI / 2;
        this.mesh.add(rock);
        this.mesh.add(glow);
        this.mesh.add(trail);
      }
      
      this.mesh.castShadow = true;
      this.mesh.receiveShadow = true;
    };

    PowerUp = function(type) {
      this.mesh = new THREE.Object3D();
      this.type = type || "shield";
      this.collected = false;

      var colors = {
        shield: 0x41d6ff,
        magnet: 0xff5c9a,
        slow: 0x7df56d
      };
      var coreMat = new THREE.MeshStandardMaterial({
        color: colors[this.type],
        emissive: colors[this.type],
        emissiveIntensity: 0.35,
        roughness: 0.35,
        metalness: 0.35,
        flatShading: true
      });
      var shellMat = new THREE.MeshBasicMaterial({
        color: colors[this.type],
        transparent: true,
        opacity: 0.22,
        wireframe: true
      });
      var core = new THREE.Mesh(new THREE.OctahedronGeometry(16, 0), coreMat);
      var shell = new THREE.Mesh(new THREE.TorusGeometry(24, 2.5, 6, 18), shellMat);
      shell.rotation.x = Math.PI / 2;
      this.mesh.add(core);
      this.mesh.add(shell);
      this.core = core;
      this.shell = shell;
    };
